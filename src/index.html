<!DOCTYPE html>
<html lang="en">

              <img src="/img/Group (6).png" alt="" />
            </div>
          </div>
          <div class="header__boxes flex gap-4">
            <div class="img">

            </div>
            <div class="images">
              <label for="checkbox"
              ><i class="fa-solid fa-bars"></i></label>
            </div>
          </div>
        </div>
      </div>
          
      <div class="hadr__img flex"></div>
       <div

        class="mobile fixed top-0 -left-[-100%] h-[100vh] w-[100%] bg-red-800"
      >

        >
            <label for="checkbox"
              ><i

            ></label>
          </div>
        </div>
      </div>
